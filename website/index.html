<!DOCTYPE html>
<html lang="en">
<head>
 <meta charset="UTF-8">
 <meta name="viewport" content="width=device-width, initial-scale=1.0">
 <title>Crazy Electric - Website UI Kit</title>
 <link rel="preconnect" href="https://fonts.googleapis.com">
 <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:ital,wght@0,700;0,800;0,900;1,700&family=Barlow:ital,wght@0,400;0,500;0,600;0,700;1,400&display=swap" rel="stylesheet">
 <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
 <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
 <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
 <style>
 *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
 html { scroll-behavior: smooth; }
 body { background: #0A0A0A; color: #fff; font-family: 'Barlow', sans-serif; }
 ::-webkit-scrollbar { width: 6px; background: #111; }
 ::-webkit-scrollbar-thumb { background: #333; border-radius: 3px; }
 </style>
</head>
<body>

<script type="text/babel" src="Header.jsx"></script>
<script type="text/babel" src="Hero.jsx"></script>
<script type="text/babel" src="Services.jsx"></script>
<script type="text/babel" src="Contact.jsx"></script>
<script type="text/babel" src="Footer.jsx"></script>

<script type="text/babel">

/* ── About Section ───────────────────────────────────────── */
const About = () => (
 <section id="about" style={{ background: '#161616', padding: '80px 32px', borderTop: '1px solid #222' }}>
 <div style={{ maxWidth: 1200, margin: '0 auto', display: 'flex', gap: 80, alignItems: 'center', flexWrap: 'wrap' }}>
 <div style={{ flex: '1 1 340px' }}>
 <div style={{ fontFamily: "'Barlow', sans-serif", fontSize: 11, fontWeight: 700, letterSpacing: '0.22em', textTransform: 'uppercase', color: '#1AD8C0', marginBottom: 12 }}>Who We Are</div>
 <h2 style={{ fontFamily: "'Barlow Condensed', sans-serif", fontWeight: 900, fontSize: 'clamp(36px,5vw,52px)', textTransform: 'uppercase', color: '#fff', lineHeight: 1, marginBottom: 24 }}>
 Clean Work.<br /><span style={{ color: '#1AD8C0' }}>No Shortcuts.</span>
 </h2>
 <p style={{ fontSize: 15, color: '#777', lineHeight: 1.8, marginBottom: 16 }}>
 Crazy Electric is a licensed CR-11 electrical contractor operating in the Phoenix metro area. We focus on mid-to-premium quality work - the kind that lasts and passes inspection.
 </p>
 <p style={{ fontSize: 15, color: '#777', lineHeight: 1.8, marginBottom: 32 }}>
 We separate base service pricing from add-ons so you always know what you're paying for. No bait-and-switch. No rushed installs. Just real, reliable electrical work.
 </p>
 <div style={{ display: 'flex', gap: 32, flexWrap: 'wrap' }}>
 {[['ROC #342950', 'License Number'], ['CR-11', 'License Class'], ['Phoenix Metro', 'Service Area']].map(([v, l]) => (
 <div key={v}>
 <div style={{ fontFamily: "'Barlow Condensed', sans-serif", fontWeight: 900, fontSize: 28, color: '#1AD8C0' }}>{v}</div>
 <div style={{ fontSize: 11, fontWeight: 700, letterSpacing: '0.1em', textTransform: 'uppercase', color: '#555', marginTop: 2 }}>{l}</div>
 </div>
 ))}
 </div>
 </div>
 <div style={{ flex: '1 1 320px', position: 'relative' }}>
 <div style={{ background: '#1A1A1A', aspectRatio: '4/3', overflow: 'hidden', position: 'relative' }}>
 <img src="../../assets/photos/bistro-pool-night.jpg" alt="Outdoor bistro string lights over backyard pool installed by Crazy Electric" style={{ width: '100%', height: '100%', objectFit: 'cover', objectPosition: 'center 35%' }} />
 <div style={{ position: 'absolute', bottom: 0, left: 0, right: 0, background: 'linear-gradient(transparent, rgba(0,0,0,0.85))', padding: '24px 20px 16px' }}>
 <div style={{ fontFamily: "'Barlow', sans-serif", fontSize: 13, fontStyle: 'italic', color: '#aaa' }}>"Clean work. No shortcuts."</div>
 </div>
 </div>
 </div>
 </div>
 </section>
);

/* ── App Root ─────────────────────────────────────────────── */
const App = () => (
 <div>
 <Header />
 <Hero />
 <Services />
 <About />
 <Contact />
 <Footer />
 </div>
);

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>

<div id="root"></div>

</body>
</html>
